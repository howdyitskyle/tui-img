name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --release
      - name: Build for macOS
        run: |
          rustup target add x86_64-apple-darwin aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin
      - name: Build for Windows
        run: |
          rustup target add x86_64-pc-windows-gnu
          cargo build --release --target x86_64-pc-windows-gnu
      - name: Create artifacts directory
        run: mkdir -p artifacts
      - name: Copy artifacts
        run: |
          cp target/release/tui-img artifacts/tui-img-linux-x86_64
          cp target/x86_64-apple-darwin/release/tui-img artifacts/tui-img-macos-x86_64
          cp target/aarch64-apple-darwin/release/tui-img artifacts/tui-img-macos-aarch64
          cp target/x86_64-pc-windows-gnu/release/tui-img.exe artifacts/tui-img-windows-x86_64.exe
      - name: Upload artifacts
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: artifacts/tui-img-linux-x86_64
          asset_name: tui-img-linux-x86_64
          asset_content_type: application/octet-stream
      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}
